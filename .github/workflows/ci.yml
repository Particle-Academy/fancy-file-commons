name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege: CI only reads the repo (CodeQL actions/missing-workflow-permissions).
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
